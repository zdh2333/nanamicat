<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 630px; height: 500px; overflow: hidden; background: #1a2744; font-family: 'Georgia', serif; }

  .bg {
    width: 630px; height: 500px;
    background: linear-gradient(145deg, #1a2744 0%, #1e3060 50%, #162038 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* 背景装饰点 */
  .bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* 顶部光晕 */
  .glow {
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 300px;
    background: radial-gradient(ellipse, rgba(100,160,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .cat-wrap {
    position: relative;
    z-index: 2;
    margin-bottom: 12px;
  }
  .cat-wrap img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
  }

  .title {
    position: relative;
    z-index: 2;
    font-size: 64px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -1px;
    font-family: 'Georgia', 'Times New Roman', serif;
    text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    line-height: 1;
  }
  .title span { color: #f7c948; }

  .subtitle {
    position: relative;
    z-index: 2;
    margin-top: 10px;
    font-size: 18px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: sans-serif;
    font-weight: 400;
  }

  /* 色块小条 */
  .bars {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 8px;
    margin-top: 24px;
    align-items: flex-end;
  }
  .bar {
    width: 14px;
    border-radius: 4px 4px 0 0;
    opacity: 0.9;
  }

  .url {
    position: absolute;
    bottom: 18px;
    z-index: 2;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    font-family: monospace;
  }
</style>
</head>
