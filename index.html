<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e2d57" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/nanamicat_mascot_celebration.png" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nanami Cat" />

    <link rel="alternate" hreflang="zh-CN" href="https://nanamicat.com/?lang=zh" />
    <link rel="alternate" hreflang="ja" href="https://nanamicat.com/?lang=ja" />
    <link rel="alternate" hreflang="x-default" href="https://nanamicat.com/" />

    <!-- Social -->
    <meta property="og:site_name" content="Nanami Cat" />
    <meta property="og:title" content="Nanami Cat - Today's Daily Word Categories Puzzle" />
    <meta property="og:description" content="Play today's Nanami Cat daily word categories puzzle. Sort 16 words into 4 hidden groups. A free daily brain teaser, available in English, Chinese, and Japanese." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nanamicat.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_CN" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta property="og:image" content="https://nanamicat.com/nanamicat_mascot_celebration.webp" />
    <meta property="og:image:width" content="160" />
    <meta property="og:image:height" content="160" />
    <meta property="og:image:alt" content="Nanami Cat celebrating a finished puzzle" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nanami Cat - Today's Daily Word Categories Puzzle" />
    <meta name="twitter:description" content="Play today's Nanami Cat daily word categories puzzle. Sort 16 words into 4 hidden groups. A free daily brain teaser, available in English, Chinese, and Japanese." />
    <meta name="twitter:image" content="https://nanamicat.com/nanamicat_mascot_celebration.webp" />

    <!-- LCP optimisation: preload the celebration mascot, the one image most likely
         to land above the fold (header). It is also the most shareable social card. -->
    <link rel="preload" as="image" href="/nanamicat_mascot_standard.webp" type="image/webp" fetchpriority="high" />

    <!-- Google Fonts: preconnect first (DNS+TLS), then load stylesheet with
         display=swap so text is never invisible. We do NOT use @import inside CSS
         anymore (that path is render-blocking). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" />
    </noscript>
    <!-- Chinese handwriting font for zh locale -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" />
    </noscript>
    <!-- Japanese handwriting font for ja locale -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" />
    </noscript>

    <title>Nanami Cat - Today's Daily Word Categories Puzzle</title>
    <meta name="description" content="Play today's Nanami Cat daily word categories puzzle for free. Sort sixteen words into four hidden groups, every day. Today's theme updated at midnight. No sign-up required." />
    <meta name="keywords" content="daily word puzzle, today puzzle, today's puzzle, connections game, word categories, daily puzzle online, free word puzzle, no signup word game, wordle alternative, NYT Connections alternative, word category game, connections puzzle, 今日单词分类游戏, 每日单词游戏, 文字分类游戏, 每日文字分类游戏, 免费单词游戏, ことばパズル, 今日のパズル, 今日のことばパズル, 文字分類パズル, 毎日の文字パズル, ことばパズル 無料, 文字パズル 無料" />

    <!-- SEO: Game + Organization + BreadcrumbList schemas (static fallback).
         Per-locale overrides (title, description, og:locale) happen at runtime
         in src/main.jsx; this is what crawlers see if JS is delayed, and the
         JSON-LD is what powers rich-result eligibility. -->
    <script type="application/ld+json" id="jsonld-schema-game">
    {
      "@context": "https://schema.org",
      "@type": "Game",
      "name": "Nanami Cat",
      "alternateName": ["MeowGrid", "ナナミキャット", "喵格谜"],
      "url": "https://nanamicat.com/",
      "description": "Free daily word category puzzle. Sort sixteen words into four hidden groups every day. No sign-up required.",
      "image": "https://nanamicat.com/nanamicat_mascot_celebration.webp",
      "genre": ["Word game", "Puzzle", "Brain teaser"],
      "gamePlatform": "Web Browser",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Any",
      "inLanguage": ["en", "zh-CN", "ja"],
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": {
        "@type": "Organization",
        "name": "Nanami Cat",
        "url": "https://nanamicat.com/"
      }
    }
    </script>
    <script type="application/ld+json" id="jsonld-schema-breadcrumb">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://nanamicat.com/" }
      ]
    }
    </script>
    <!-- FAQPage schema (static English fallback). Mirrors the visible FAQ on
         the home view; src/main.jsx swaps in the per-locale version at runtime.
         Keep this text in sync with the en FAQ in SEO_BY_LOCALE. -->
    <script type="application/ld+json" id="jsonld-schema-faq">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "inLanguage": "en",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is today's puzzle really free?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Nanami Cat is a free daily word puzzle with no signup, no download, and no paywall. Open the page and play." }
        },
        {
          "@type": "Question",
          "name": "How is today's puzzle different from yesterday's?",
          "acceptedAnswer": { "@type": "Answer", "text": "A new theme and four new groups unlock at midnight UTC. Yesterday's puzzle stays playable in the archive." }
        },
        {
          "@type": "Question",
          "name": "Can I share today's result?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Hit the share button on the result screen to copy a Connections-style emoji block to your clipboard, or use the system share sheet on mobile." }
        }
      ]
    }
    </script>

    <!-- AdSense config. Toggle `enabled` to false to instantly turn all
         ads off without redeploying. Slot ids are the numeric AdSense
         "ad unit" ids from the AdSense console. -->
    <script>
      window.NANAMICAT_ADS_CONFIG = {
        enabled: true,
        clientId: "ca-pub-4282000221262612",
        slots: {
          "page-bottom": "1962176281"
        }
      };
    </script>

    <!-- AdSense verification and runtime loader. Keep this exact static tag in
         <head>; the AdSense site-ownership checker scans raw HTML and may not
         execute our app bootstrap code. -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4282000221262612" crossorigin="anonymous"></script>
  </head>
  <body>
    <noscript>
      <p style="padding:24px;font-family:system-ui,sans-serif;max-width:640px;margin:0 auto;">
        Nanami Cat needs JavaScript to run the daily word puzzle. Please enable
        JavaScript, or read more on the <a href="/about">About</a> page.
      </p>
    </noscript>
    <div id="root">
      <!-- SSR-ish placeholder: the first thing the user sees while React boots.
           This block mirrors the H1 so LCP is paintable without waiting for JS. -->
      <main style="min-height:100dvh;display:grid;place-items:center;font-family:'Caveat','PingFang SC',system-ui,sans-serif;color:#12345f;background:#f8f1e4;">
        <h1 style="font-size:clamp(2.4rem,5vw,3.4rem);margin:0;">Nanami Cat</h1>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
